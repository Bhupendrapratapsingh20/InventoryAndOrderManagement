# Render.com Blueprint – Inventory & Order Management API
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: inventory-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    branch: main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: APP_NAME
        value: "Inventory & Order Management API"
      - key: DEBUG
        value: "false"
      - key: API_V1_PREFIX
        value: "/api/v1"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: USE_SSL
        value: "true"
    healthCheckPath: /health/

databases:
  - name: inventory-db
    plan: free
    region: oregon
    databaseName: inventory_db
    user: inventory_user
